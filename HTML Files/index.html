<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Landing Page</title>
  <link rel="stylesheet" href="../Css Files/index.css">
  <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
  <script defer src="../Javascript Files/index.js"></script>
</head>
<body>

  <div class="landing-con">

    <div class="landing-nav">

      <div class="landing-nav-logo">
        <h3>LearnSpace</h3>
      </div>
      <div class="landing-nav-links">
        <p class="link">Features</p>
        <p class="link">Courses</p>
        <p class="link">About</p>
      </div>
      <div class="login-button">

        <a href="../HTML Files/login.html" class="login">Login</a>
        
      </div>
    </div>

    <div class="lp-con">
      <div class="learning-platform-background"></div>
      <div class="lp-content">Learning Platform</div>
    </div>

    <div class="mid-section">

      <div class="landing-left-con">

        <div class="llc-header">
          <h1>Learn without <span style="color: #5edd7b;">limits.</span> Grow without borders!
          </h1>
        </div>

        <div class="llc-text">
          <p style="color: #9fb0f8;">LearnSpace brings your courses, assignments and progress together &mdash; beautifully designed for the modern learner.</p>
        </div>

        <div class="get-started-con">
          <a href="./sign-up.html" class="get-started" target="_blank">Get Started</a>
        </div>

      </div>


      <div class="landing-right-con">
        <div class="box-1"></div>
        <div class="box-2"></div>
        <div class="box-3"></div>
      </div>

    </div>


    <div class="bottom-section">
      
    </div>


  </div>
</body>

</html>
